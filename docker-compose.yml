version: '3.9'

services:
  docs-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development

volumes:
  node_modules:
