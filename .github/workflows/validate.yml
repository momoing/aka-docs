name: Validate content

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-media:
    name: Validate media
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate media files and references
        run: node scripts/validate-media.mjs

  validate-mdx:
    name: Validate MDX compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install MDX compiler
        run: npm install
        working-directory: scripts

      - name: Validate MDX compilation
        run: node scripts/validate-mdx.mjs
