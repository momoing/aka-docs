version: '3.9'

services:
  docs:
    image: ${REGISTRY:-ghcr.io}/your-org/aka-docs:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
